<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Giriş</title>
</head>

<body style="font-family:Arial;text-align:center;padding-top:100px">

<h2>🐞 Uğur Böceği Admin Giriş</h2>

<input id="pass" type="password" placeholder="Şifre" style="padding:10px">
<br><br>

<button onclick="login()" style="padding:10px 20px">Giriş Yap</button>

<script>
function login(){
const pass = document.getElementById("pass").value;

if(pass === "1234"){
window.location.href = "admin-panel.html";
}else{
alert("Hatalı şifre");
}
}
</script>

</body>
</html>
